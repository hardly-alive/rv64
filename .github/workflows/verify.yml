name: RV64IM Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Crucial since you have riscv-tests-repo

      - name: Build Docker Image
        run: docker build -t riscv-lab .

      - name: Run Regression Suite
        # We run the command INSIDE the image we just built
        run: |
          docker run --rm -v ${{ github.workspace }}:/work riscv-lab make regression
        
      - name: Run Spike Co-Simulation
        run: |
          docker run --rm -v ${{ github.workspace }}:/work riscv-lab make spike TEST=alu_test